
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#wrap { display: flex; flex-direction: column; height: 620px; max-width: 500px; margin: 1rem auto; border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
#hdr { background: #0F6E56; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
#av { width: 42px; height: 42px; border-radius: 50%; background: #5DCAA5; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 500; color: #04342C; flex-shrink: 0; }
#hdr-info h2 { color: #E1F5EE; font-size: 15px; font-weight: 500; }
#hdr-info p { color: #9FE1CB; font-size: 12px; margin-top: 2px; }
#odot { width: 7px; height: 7px; background: #5DCAA5; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
#key-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; gap: 16px; background: var(--color-background-secondary); }
#key-screen p { font-size: 14px; color: var(--color-text-secondary); text-align: center; line-height: 1.6; }
#key-screen strong { color: var(--color-text-primary); font-weight: 500; }
#key-inp { width: 100%; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 13.5px; background: var(--color-background-primary); color: var(--color-text-primary); outline: none; font-family: var(--font-sans); }
#key-inp:focus { border-color: #1D9E75; }
#key-err { font-size: 12px; color: var(--color-text-danger); display: none; }
#key-btn { width: 100%; padding: 10px; border-radius: var(--border-radius-md); background: #0F6E56; color: #E1F5EE; border: none; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font-sans); }
#key-btn:hover { background: #085041; }
#key-note { font-size: 12px; color: var(--color-text-tertiary); text-align: center; }
#chat-area { flex: 1; flex-direction: column; display: none; overflow: hidden; }
#topics { display: flex; gap: 6px; padding: 10px 14px; background: #E1F5EE; flex-wrap: wrap; border-bottom: 0.5px solid #9FE1CB; }
.topic { padding: 4px 11px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: 500; border: 0.5px solid #1D9E75; color: #085041; background: #E1F5EE; transition: background 0.15s; }
.topic:hover { background: #9FE1CB; }
#msgs { flex: 1; overflow-y: auto; padding: 14px; background: var(--color-background-secondary); display: flex; flex-direction: column; gap: 10px; }
.msg { max-width: 84%; display: flex; flex-direction: column; gap: 3px; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bbl { padding: 10px 14px; border-radius: 16px; font-size: 13.5px; line-height: 1.55; white-space: pre-wrap; }
.msg.bot .bbl { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); border-bottom-left-radius: 4px; }
.msg.user .bbl { background: #0F6E56; color: #E1F5EE; border-bottom-right-radius: 4px; }
.ts { font-size: 11px; color: var(--color-text-tertiary); }
.msg.user .ts { text-align: right; }
#inp-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--color-background-primary); border-top: 0.5px solid var(--color-border-tertiary); }
#txt { flex: 1; border: 0.5px solid var(--color-border-secondary); border-radius: 20px; padding: 9px 14px; font-size: 13.5px; background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; font-family: var(--font-sans); }
#txt:focus { border-color: #1D9E75; }
#sbtn { width: 36px; height: 36px; border-radius: 50%; background: #0F6E56; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#sbtn:hover { background: #085041; }
#sbtn svg { width: 15px; height: 15px; fill: #E1F5EE; }
.typing { display: flex; align-items: center; gap: 5px; padding: 10px 14px; }
.typing span { width: 6px; height: 6px; background: #9FE1CB; border-radius: 50%; animation: bop 1s infinite; }
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bop { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
</style>

<div id="wrap">
  <div id="hdr">
    <div id="av">S</div>
    <div id="hdr-info">
      <h2>Shevora</h2>
      <p><span id="odot"></span>Your big sister in growth</p>
    </div>
  </div>

  <div id="key-screen">
    <div style="width:52px;height:52px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="5"/><path d="M21 2l-9.5 9.5M15.5 7.5l2 2M13 10l2 2"/></svg>
    </div>
    <p><strong>Enter your OpenAI API key</strong><br/>Your key stays in this session only — it is never stored or shared.</p>
    <div style="width:100%;display:flex;flex-direction:column;gap:8px;">
      <input id="key-inp" type="password" placeholder="sk-..." />
      <span id="key-err">Invalid key format. It should start with sk-</span>
      <button id="key-btn" onclick="startChat()">Start chatting with Shevora</button>
    </div>
    <p id="key-note">Get your key at platform.openai.com</p>
  </div>

  <div id="chat-area">
    <div id="topics">
      <div class="topic" onclick="sendChip('I need career clarity')">Career clarity</div>
      <div class="topic" onclick="sendChip('I struggle with confidence')">Confidence</div>
      <div class="topic" onclick="sendChip('I want to start making money')">Money growth</div>
      <div class="topic" onclick="sendChip('I just finished NYSC and I am lost')">Post-NYSC</div>
      <div class="topic" onclick="sendChip('Family pressure is affecting me')">Family pressure</div>
    </div>
    <div id="msgs"></div>
    <div id="inp-row">
      <input id="txt" type="text" placeholder="Talk to Shevora..." />
      <button id="sbtn" onclick="go()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
let apiKey = '';
const hist = [];
const msgsEl = document.getElementById('msgs');
const txtEl = document.getElementById('txt');

const sys = `You are "Shevora AI", a highly intelligent, emotionally aware growth coach for young African women (ages 18–30).

Your mission is to guide users from confusion → clarity → confidence → consistent action → income and independence.

You specialize in:
1. Career Growth (career clarity, skill-building, job strategy, realistic opportunities)
2. Confidence & Mindset (self-doubt, fear, comparison, discipline)
3. Money Growth (earning, side hustles, financial awareness, starting small)
4. Habits & Health (overcoming procrastination, building discipline, simple productivity habits, mental well-being)

---

YOUR PERSONALITY:
- Warm, relatable, like a big sister who genuinely cares
- Honest and direct (you do not sugarcoat reality)
- Practical and solution-focused
- Encouraging but not overly motivational or cheesy
- Culturally aware (understand challenges like unemployment, NYSC, family pressure, limited resources)

---

CORE BEHAVIOR RULES:

1. ALWAYS UNDERSTAND FIRST
- Ask 1–3 thoughtful questions before giving advice
- Do not assume the user's situation

2. BE PRACTICAL, NOT GENERIC
- Avoid vague advice like "just believe in yourself"
- Give clear, actionable, step-by-step guidance

3. BREAK THINGS DOWN
- Turn overwhelming problems into small, doable steps
- Make everything feel achievable

4. CONNECT EVERYTHING TO ACTION
- Every conversation should lead to a next step, no matter how small

5. BUILD HABITS, NOT JUST IDEAS
- When a user is stuck, overwhelmed, or procrastinating:
  - identify the real cause (fear, confusion, lack of structure)
  - suggest ONE small habit or action they can start immediately

6. KEEP IT REALISTIC
- Assume the user may have:
  - limited money
  - limited access to opportunities
  - inconsistent motivation
- Give solutions that work in real-life conditions

7. DO NOT OVERWHELM
- Limit suggestions to 2–5 clear steps
- Keep responses concise but impactful

---

CONVERSATION STYLE:

- Start by acknowledging the user's situation
- Ask clarifying questions if needed
- Then provide structured guidance using:
  - short paragraphs
  - numbered steps
  - simple language

---

WHEN HANDLING SPECIFIC AREAS:

CAREER:
- Help users discover strengths and interests
- Suggest realistic career paths
- Provide clear "start here" steps (skills, tools, learning path)

CONFIDENCE:
- Reframe negative thinking
- Normalize fear but discourage avoidance
- Give small confidence-building actions

MONEY:
- Suggest simple, realistic ways to start earning
- Focus on skills-based or accessible opportunities
- Encourage starting small over waiting for perfect conditions

HABITS & HEALTH:
- Focus on discipline, consistency, and mental clarity
- Help users overcome procrastination
- Recommend small, repeatable habits (not drastic routines)

---

WEEKLY STRUCTURE:

When appropriate, generate a simple weekly plan:

- Clear focus for the week
- 3 actionable tasks
- 1 small habit to build

---

IMPORTANT:

- Do not try to solve everything at once
- Do not overwhelm the user
- Your goal is progress, not perfection

End most responses with a gentle nudge toward action or a follow-up question.

You are not just giving advice—you are guiding transformation.`;

function startChat() {
  const val = document.getElementById('key-inp').value.trim();
  const err = document.getElementById('key-err');
  if (!val.startsWith('sk-')) { err.style.display = 'block'; return; }
  err.style.display = 'none';
  apiKey = val;
  document.getElementById('key-screen').style.display = 'none';
  const ca = document.getElementById('chat-area');
  ca.style.display = 'flex';
  ca.style.flexDirection = 'column';
  ca.style.flex = '1';
  ca.style.overflow = 'hidden';
  addMsg("Hey sis, welcome. I'm Shevora — think of me as that big sister who will be real with you, help you get clear on what you want, and actually show you how to get there.\n\nNo fluff, no empty hype. Just honest, practical steps.\n\nSo tell me — what's going on with you right now? What's the one thing that's been weighing on your mind lately?", 'bot');
}

function now() { return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

function addMsg(text, role) {
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<div class="bbl">${text}</div><span class="ts">${now()}</span>`;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function addTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typ';
  d.innerHTML = `<div class="bbl typing"><span></span><span></span><span></span></div>`;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function rmTyping() { const t = document.getElementById('typ'); if(t) t.remove(); }

async function callAPI(msg) {
  hist.push({role:'user', content: msg});
  addTyping();
  try {
    const r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [{role:'system', content: sys}, ...hist]
      })
    });
    const data = await r.json();
    rmTyping();
    if (data.error) { addMsg("Error: " + data.error.message, 'bot'); return; }
    const reply = data.choices?.[0]?.message?.content || "I'm here — tell me more, sis.";
    hist.push({role:'assistant', content: reply});
    addMsg(reply, 'bot');
  } catch(e) {
    rmTyping();
    addMsg("Something went wrong. Check your key and try again.", 'bot');
  }
}

function go() {
  const v = txtEl.value.trim();
  if (!v) return;
  addMsg(v, 'user');
  txtEl.value = '';
  callAPI(v);
}

function sendChip(t) { addMsg(t, 'user'); callAPI(t); }
txtEl.addEventListener('keydown', e => { if(e.key==='Enter') go(); });
document.getElementById('key-inp').addEventListener('keydown', e => { if(e.key==='Enter') startChat(); });
</script>
